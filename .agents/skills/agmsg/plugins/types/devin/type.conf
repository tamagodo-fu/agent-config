# agmsg agent-type manifest — read-only key=value DATA. NEVER sourced.
#
# External plugin (types axis). Facts below verified against the local
# `devin --help`, `devin rules paths`, `devin skills paths` (devin 3000.1.27)
# and https://docs.devin.ai/cli/reference/commands — no fact guessed. Trust
# this driver with: agmsg plugin trust types/devin
name=devin
template=template.md
cli=devin
spawnable=yes
model_arg=--model
# Devin's help usage gates the trailing prompt positional behind a literal "--"
# token: "Usage: devin [OPTIONS] [-- <PROMPT>...] [COMMAND]", and the docs'
# own example is `devin -p -- list all TODO comments`. prompt_arg emits that
# token right before the %q-quoted prompt (boot-command.sh's
# agmsg_role_cli_args), so spawn/actas boot as `devin -- "/agmsg actas <name>"`
# instead of a bare positional a clap parser could misparse against COMMAND
# names (auth, mcp, rules, skills, plugins, cloud, list, ...).
prompt_arg=--
# No confirmed env var marks "this shell is inside a live devin CLI session".
# `devin --help` only documents DEVIN_API_TOKEN / DEVIN_ORG_ID / DEVIN_BASE_URL
# / DEVIN_API_VERSION / DEVIN_MODEL / DEVIN_PERMISSION_MODE / DEVIN_SANDBOX —
# all config knobs, not session identity (confirmed against
# docs.devin.ai/cli/reference/commands too). detect=explicit (never
# auto-detected) until a real session-id var turns up; whoami still works via
# explicit actas.
detect=explicit
detect_proc=devin devin-*
# Devin's own always-on rule convention is a directory it already scans every
# turn: `devin rules paths` reports "Devin rules: .windsurf/rules/*.md
# (always-on)" (distinct from ".cursor/rules/*.md (conditional)"). This is the
# same shape as gemini/grok-build/opencode/cursor/antigravity's rule-file
# delivery (see _delivery.sh -> lib/delivery-rulefile.sh). Devin has no
# documented SessionStart/Stop hook-config file format to target instead — its
# `/hooks` slash command lists user-defined tool-call hooks, not an agmsg-style
# lifecycle event file.
hooks_file=.windsurf/rules/agmsg.md
monitor=no
delivery_modes=turn off
